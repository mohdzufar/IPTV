name: Fix Flatten.m3u8 line breaks

on:
  workflow_dispatch:

permissions:
  contents: write   # <-- this gives write access to push commits

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fix script
        run: python scripts/fix_flatten.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Channels/Flatten.m3u8
          git diff --cached --quiet || (git commit -m "Fix missing line breaks in Flatten.m3u8" && git push)
