name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 21 * * *'  # 5 AM Malaysia (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install chromium

      - name: Step 1 - Copy Flatten and clean comments
        run: |
          $content = Get-Content -Path Channels\Flatten.m3u8 | Where-Object { $_ -notmatch '^##' -and $_ -notmatch '^\s*$' }
          [System.IO.File]::WriteAllLines("$PWD\Main.m3u8", $content)

      - name: Step 2 & 3 - Validate non‑Mana channels
        run: python scripts/validate_and_update.py

      - name: Step 3 & 4 - Refresh Mana2 tokens
        run: python scripts/refresh_mana2.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Main.m3u8 Channels/ validation-report.txt
          $changes = git diff --cached --name-only
          if ($changes) {
              git commit -m "Automated daily update"
              git remote set-url origin https://x-access-token:$env:GITHUB_TOKEN@github.com/mohdzufar/IPTV.git
              $retry = 0
              $maxRetries = 3
              $pushSuccess = $false
              do {
                  $retry++
                  $output = git push 2>&1
                  if ($LASTEXITCODE -eq 0) {
                      Write-Host "Push succeeded on attempt $retry."
                      $pushSuccess = $true
                      break
                  } else {
                      Write-Host "Push attempt $retry failed (exit code $LASTEXITCODE). Output: $output"
                      if ($retry -lt $maxRetries) {
                          Write-Host "Retrying in 30 seconds..."
                          Start-Sleep -Seconds 30
                      }
                  }
              } while ($retry -lt $maxRetries -and -not $pushSuccess)
              if (-not $pushSuccess) {
                  Write-Host "ERROR: Push failed after $maxRetries attempts."
                  exit 1
              }
          } else {
              Write-Host "No changes to commit"
          }
