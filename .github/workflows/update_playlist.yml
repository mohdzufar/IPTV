name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 21 * * *'  # 5 AM Malaysia (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install chromium

      - name: Step 1 - Copy Flatten and clean comments
        run: |
          $content = Get-Content -Path Channels\Flatten.m3u8 | Where-Object { $_ -notmatch '^##' -and $_ -notmatch '^\s*$' }
          [System.IO.File]::WriteAllLines("$PWD\Main.m3u8", $content)

      - name: Step 2 - Refresh Mana2 tokens
        run: python scripts/refresh_mana2.py

      - name: Step 3 & 4 - Validate and update playlist
        run: python scripts/validate_and_update.py

      - name: Commit and push changes
        shell: bash    # <--- THIS IS THE KEY FIX
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Main.m3u8 Channels/ validation-report.txt
          git diff --cached --quiet || (git commit -m "Automated daily update" && git push)
