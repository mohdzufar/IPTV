name: Flatten IPTV Playlist

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Channels/Flatten.m3u8'
      - 'Channels/**/*.m3u8'
      - 'Channels/**/*.m3u'
  workflow_dispatch:
  schedule:
    # Runs every day at 5:00 AM Malaysia Time (UTC+8) = 21:00 UTC
    - cron: '0 21 * * *'

jobs:
  flatten:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to push changes back to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Fetch full history for clean rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run flatten script
        run: python scripts/flatten.py

      - name: Commit and push flattened file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the changes made by flatten.py
          git add Main.m3u8
          
          # If no changes, exit cleanly
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit the flattened file
          git commit -m "Auto-update flattened playlist [skip ci]"
          
          # Pull latest remote changes (with autostash for safety)
          git pull --rebase --autostash origin main
          
          # Push the commit
          git push
