name: Flatten IPTV Playlist

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 5:00 AM Malaysia Time (UTC+8) = 21:00 UTC
    - cron: '0 21 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flatten:
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'      # Use a stable version
          check-latest: true

      - name: Run flatten script
        run: python scripts/flatten.py
        shell: cmd

      - name: Commit and push flattened file
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Main.m3u8
          $changes = git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit"
            exit 0
          }
          git commit -m "Auto-update flattened playlist [skip ci]"
          git pull --rebase --autostash origin main
          git push
