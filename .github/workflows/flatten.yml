name: Flatten Playlist

on:
  push:
    branches: [ main ]
    paths:
      - 'Channels/Flatten.m3u8'
      - 'Channels/**/*.m3u8'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'   # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  copy-main-m3u8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Flatten.m3u8 to Main.m3u8
        run: cp Channels/Flatten.m3u8 Main.m3u8

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain) ]]; then
            git add Main.m3u8
            git commit -m "Update Main.m3u8 from Flatten.m3u8"
            git push
          else
            echo "No changes to commit."
          fi
