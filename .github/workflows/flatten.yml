name: Flatten IPTV Playlist

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 5:00 AM Malaysia Time (UTC+8) = 21:00 UTC
    - cron: '0 21 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flatten:
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          check-latest: false

      - name: Install Playwright and Stealth dependencies
        run: |
          pip install playwright playwright-stealth
          playwright install chromium
        shell: cmd

      - name: Refresh Mana-Mana streams
        run: python scripts/refresh_mana2.py
        shell: cmd

      - name: Run flatten script
        run: python scripts/flatten.py
        shell: cmd

      - name: Debug - Show Git Status
        run: git status
        shell: cmd
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Main.m3u8
          git add Channels/Mana-Mana/
          git diff --cached --quiet
          if %errorlevel% equ 0 (
            echo No changes to commit
            exit /b 0
          )
          git commit -m "Auto-refresh tokens & flatten playlist [skip ci]"
          git pull --rebase --autostash origin main
          git push
        shell: cmd
