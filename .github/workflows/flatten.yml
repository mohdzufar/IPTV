name: Flatten IPTV Playlist

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 5:00 AM Malaysia Time (UTC+8) = 21:00 UTC
    - cron: '0 21 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flatten:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5   # Updated to Node.js 24 compatible version
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6   # Updated to Node.js 24 compatible version
        with:
          python-version: '3.11'
          check-latest: false

      - name: Run flatten script
        run: python scripts/flatten.py

      - name: Commit and push flattened file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Main.m3u8
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update flattened playlist [skip ci]"
          git pull --rebase --autostash origin main
          git push
