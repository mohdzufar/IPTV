name: Flatten IPTV Playlist

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Channels/Flatten.m3u8'
      - 'Channels/**/*.m3u8'
      - 'Channels/**/*.m3u'
  workflow_dispatch:
  schedule:
    # Runs every day at 5:00 AM Malaysia Time (UTC+8) = 21:00 UTC
    - cron: '0 21 * * *'

jobs:
  flatten:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run flatten script
        run: C:\Users\zufar\AppData\Local\Python\bin\python.exe -u scripts/flatten.py
        shell: cmd

      - name: Commit and push flattened file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Main.m3u8
          $changes = git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit"
            exit 0
          }
          git commit -m "Auto-update flattened playlist [skip ci]"
          git pull --rebase --autostash origin main
          git push
