name: Flatten IPTV Playlist

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Channels/Flatten.m3u8'
      - 'Channels/**/*.m3u8'
      - 'Channels/**/*.m3u'
  workflow_dispatch:   # Allow manual trigger from Actions tab
  schedule:
    # Runs every day at 5:00 AM Malaysia Time (UTC+8) = 21:00 UTC
    - cron: '0 21 * * *'

jobs:
  flatten:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Fetch full history for clean rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run flatten script
        run: python scripts/flatten.py

      - name: Commit and push flattened file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest remote changes to avoid push conflicts
          git pull --rebase origin main
          
          git add Main.m3u8
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update flattened playlist [skip ci]"
            git push
          fi
