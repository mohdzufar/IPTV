name: Flatten IPTV Playlist

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Channels/Flatten.m3u8'
      - 'Channels/**/*.m3u8'
      - 'Channels/**/*.m3u'
  workflow_dispatch:

jobs:
  flatten:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Fetch all history so rebase works properly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run flatten script
        run: python scripts/flatten.py

      - name: Commit and push flattened file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes from remote to avoid push rejection
          git pull --rebase origin main
          
          git add Main.m3u8
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update flattened playlist [skip ci]"
            git push
          fi
